name: DevNexa Global CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Compile and Test Backend
      run: |
        cd backend
        mvn clean test

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Compile Frontend
      run: |
        cd frontend
        npm ci
        npm run build

  docker-build:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Stubs for pushing to Docker Hub or Railway / Vercel registry registries
    - name: Build Backend Docker Image
      run: |
        docker build -t devnexa-backend:latest ./backend

    - name: Build Frontend Docker Image
      run: |
        docker build -t devnexa-frontend:latest ./frontend
